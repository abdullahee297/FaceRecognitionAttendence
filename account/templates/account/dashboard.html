<h1>Attendance Dashboard</h1>

<table border="1">

<tr>
    <th>Name</th>
    <th>Check In</th>
    <th>Status</th>
</tr>

{% for attendance in attendances %}

<tr>

<td>
    {{ attendance.employee.user.username }}
</td>

<td>
    {{ attendance.check_in }}
</td>

<td>
    {{ attendance.status }}
</td>

</tr>

{% endfor %}

</table>
