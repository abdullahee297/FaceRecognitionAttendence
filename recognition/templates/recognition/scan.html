<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Attendance Scanner</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    overflow:hidden;
    text-align:center;
}

.header{
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    padding:25px;
}

.header h1{
    font-size:28px;
}

.content{
    padding:30px;
}

video{
    width:100%;
    max-width:500px;
    border-radius:15px;
    border:4px solid #667eea;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.status{
    margin-top:15px;
    color:#666;
    font-weight:600;
}

.button{
    margin-top:25px;
    padding:14px 30px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(102,126,234,0.3);
}

.result-box{
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    background:#f4f7ff;
    color:#333;
    font-weight:600;
    display:none;
}

.success{
    background:#d4edda;
    color:#155724;
}

.error{
    background:#f8d7da;
    color:#721c24;
}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Face Attendance Scanner</h1>
    </div>

    <div class="content">

        <video id="video" autoplay></video>

        <div class="status">
            Position your face in front of the camera
        </div>

        <button class="button" onclick="scanFace()">
            Scan Face
        </button>

        <div id="result" class="result-box"></div>

    </div>

</div>

<script>

const video = document.getElementById('video');
const resultBox = document.getElementById('result');

navigator.mediaDevices.getUserMedia({
    video:true
})
.then(stream=>{
    video.srcObject = stream;
})
.catch(err=>{
    alert("Camera access denied");
});

function scanFace(){

    const canvas = document.createElement('canvas');
    canvas.width = 500;
    canvas.height = 400;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(video,0,0,500,400);

    const image = canvas.toDataURL('image/jpeg');

    resultBox.style.display = "block";
    resultBox.innerHTML = "Scanning face...";

    fetch('/scan-face/',{

        method:'POST',

        headers:{
            'Content-Type':'application/json',
            'X-CSRFToken':'{{ csrf_token }}'
        },

        body:JSON.stringify({
            image:image
        })

    })
    .then(res=>res.json())
    .then(data=>{

        resultBox.innerHTML = data.message;

        if(data.status === "success"){
            resultBox.className = "result-box success";
        }else{
            resultBox.className = "result-box error";
        }

    })
    .catch(()=>{

        resultBox.innerHTML = "Error scanning face";
        resultBox.className = "result-box error";

    });
}

</script>

</body>
</html>
